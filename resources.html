    <style>
        :root {
            --teal: #0D9488;
            --teal-dark: #0F766E;
            --teal-light: #F0FDFA;
            --coral: #F97316;
            --navy: #1E3A5F;
            --slate: #475569;
            --light-gray: #F8FAFC;
            --green: #16A34A;
            --spacing: 1rem;
            --max-width: 1200px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--slate);
            line-height: 1.6;
            background: white;
        }

        /* Navigation */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 2rem;
      background: var(--white);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 1000;
      transition: box-shadow 0.3s ease;
    }
    
    nav.scrolled {
      box-shadow: var(--shadow-sm);
    }
    
    .nav-logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--navy);
      text-decoration: none;
    }
    
    .nav-menu {
      display: flex;
      list-style: none;
      gap: 2rem;
      align-items: center;
    }
    
    .nav-menu a {
      text-decoration: none;
      color: var(--slate);
      font-weight: 500;
      transition: color 0.3s ease;
    }
    
    .nav-menu a:hover {
      color: var(--teal);
    }
    
    .nav-toggle {
      display: none;
      background: none;
      border: none;
      font-size: 1.5rem;
      color: var(--slate);
      cursor: pointer;
    }
    
    
    
    /* Mobile Navigation */
    @media (max-width: 768px) {
      .nav-toggle {
        display: block;
      }
      
      .nav-menu {
        display: none;
        position: absolute;
        top: 60px;
        left: 0;
        right: 0;
        flex-direction: column;
        gap: 0;
        background: var(--white);
        border-bottom: 1px solid var(--border);
        padding: 1rem 0;
      }
      
      .nav-menu.active {
        display: flex;
      }
      
      .nav-menu li {
        width: 100%;
        padding: 1rem 2rem;
        border-bottom: 1px solid var(--border);
      }
      
      h1 {
        font-size: 2.5rem;
      }
      
      h2 {
        font-size: 1.75rem;
      }
    }

    

        /* HERO SECTION */
        .hero {
            background: linear-gradient(135deg, var(--teal) 0%, var(--teal-dark) 100%);
            color: white;
            padding: 3rem 2rem;
            text-align: center;
        }

        .hero-container {
            max-width: var(--max-width);
            margin: 0 auto;
        }

        .breadcrumb {
            font-size: 0.875rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        .breadcrumb a {
            color: white;
            text-decoration: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.5);
        }

        .breadcrumb a:hover {
            border-bottom-color: white;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            font-weight: 700;
        }

        .hero-subheading {
            font-size: 1.25rem;
            margin-bottom: 2rem;
            opacity: 0.95;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        .hero-disclaimer {
            font-size: 0.875rem;
            opacity: 0.85;
            font-style: italic;
            max-width: 600px;
            margin: 0 auto;
        }

        /* MAIN LAYOUT */
        .main-wrapper {
            display: flex;
            max-width: var(--max-width);
            margin: 0 auto;
            gap: 3rem;
            padding: 3rem 2rem;
            position: relative;
        }

        .content {
            flex: 1;
            min-width: 0;
        }

        .sidebar {
            width: 250px;
            position: sticky;
            top: 120px;
            height: fit-content;
        }

        /* TABLE OF CONTENTS SIDEBAR */
        .toc {
            background: var(--teal-light);
            border-left: 4px solid var(--teal);
            padding: 1.5rem;
            border-radius: 8px;
        }

        .toc h3 {
            color: var(--teal-dark);
            margin-bottom: 1rem;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .toc ul {
            list-style: none;
        }

        .toc li {
            margin: 0.5rem 0;
        }

        .toc a {
            color: var(--slate);
            text-decoration: none;
            font-size: 0.9rem;
            padding: 0.5rem 0;
            display: block;
            border-left: 2px solid transparent;
            padding-left: 0.75rem;
            transition: all 0.3s;
        }

        .toc a:hover,
        .toc a.active {
            color: var(--teal);
            border-left-color: var(--teal);
            padding-left: 1rem;
        }

        /* SIDEBAR CTA */
        .sidebar-cta {
            background: var(--teal-light);
            border: 2px solid var(--teal);
            border-radius: 8px;
            padding: 1.5rem;
            text-align: center;
            margin-top: 2rem;
        }

        .sidebar-cta h4 {
            color: var(--teal-dark);
            margin-bottom: 0.75rem;
            font-size: 1rem;
        }

        .sidebar-cta p {
            font-size: 0.875rem;
            margin-bottom: 1rem;
            color: var(--slate);
            line-height: 1.5;
        }

        .sidebar-cta-btn {
            display: inline-block;
            background: var(--teal);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            width: 100%;
            margin-bottom: 0.5rem;
        }

        .sidebar-cta-btn:hover {
            background: var(--teal-dark);
            transform: translateY(-2px);
        }

        .sidebar-cta-phone {
            font-size: 0.875rem;
            color: var(--slate);
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
        }

        .sidebar-cta-phone strong {
            display: block;
            margin-bottom: 0.5rem;
        }

        .sidebar-cta-badge {
            font-size: 0.75rem;
            color: var(--teal);
            font-weight: 600;
            margin-top: 0.75rem;
        }

        /* CONTENT SECTIONS */
        section {
            margin-bottom: 4rem;
            scroll-margin-top: 140px;
        }

        h2 {
            font-size: 2rem;
            color: var(--navy);
            margin-bottom: 1.5rem;
            margin-top: 0;
        }

        h3 {
            font-size: 1.5rem;
            color: var(--teal-dark);
            margin-top: 2rem;
            margin-bottom: 1rem;
        }

        h4 {
            font-size: 1.1rem;
            color: var(--slate);
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
            font-weight: 600;
        }

        p {
            margin-bottom: 1rem;
            font-size: 1rem;
            line-height: 1.8;
        }

        a {
            color: var(--teal);
            text-decoration: none;
            font-weight: 500;
            border-bottom: 1px solid rgba(13, 148, 136, 0.3);
            transition: all 0.3s;
        }

        a:hover {
            border-bottom-color: var(--teal);
        }

        /* PARTS GRID */
        .parts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .part-card {
            border-radius: 12px;
            padding: 2rem;
            background: white;
            border: 1px solid #e2e8f0;
            transition: all 0.3s;
        }

        .part-card:hover {
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transform: translateY(-5px);
        }

        .part-card.navy {
            border-top: 4px solid var(--navy);
        }

        .part-card.teal {
            border-top: 4px solid var(--teal);
        }

        .part-card.coral {
            border-top: 4px solid var(--coral);
        }

        .part-card.green {
            border-top: 4px solid var(--green);
        }

        .part-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .part-card.navy .part-icon {
            color: var(--navy);
            background: rgba(30, 58, 95, 0.1);
        }

        .part-card.teal .part-icon {
            color: var(--teal);
            background: var(--teal-light);
        }

        .part-card.coral .part-icon {
            color: var(--coral);
            background: rgba(249, 115, 22, 0.1);
        }

        .part-card.green .part-icon {
            color: var(--green);
            background: rgba(22, 163, 74, 0.1);
        }

        .part-card h3 {
            margin-top: 0;
            font-size: 1.35rem;
        }

        .part-card ul {
            margin: 1rem 0;
            padding-left: 1.5rem;
        }

        .part-card li {
            margin-bottom: 0.5rem;
            line-height: 1.7;
        }

        .part-card strong {
            color: var(--navy);
        }

        /* COMPARISON TABLE */
        .comparison-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin: 2rem 0;
        }

        .comparison-card {
            background: var(--light-gray);
            border-radius: 12px;
            padding: 2rem;
            border-left: 4px solid var(--teal);
        }

        .comparison-card h4 {
            color: var(--navy);
            margin-top: 0;
            font-size: 1.25rem;
            margin-bottom: 1.5rem;
        }

        .comparison-item {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }

        .comparison-label {
            font-weight: 600;
            color: var(--slate);
            min-width: 120px;
        }

        .comparison-value {
            color: var(--navy);
            flex: 1;
        }

        /* TIMELINE / ENROLLMENT CARDS */
        .timeline {
            position: relative;
            padding: 2rem 0;
        }

        .timeline-item {
            background: var(--light-gray);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border-left: 4px solid var(--teal);
            padding-left: 2rem;
        }

        .timeline-item h4 {
            color: var(--teal-dark);
            margin-top: 0;
            margin-bottom: 0.75rem;
        }

        .timeline-item p {
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        /* RESOURCES GRID */
        .resources-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
        }

        .resource-card {
            background: white;
            border: 2px solid var(--teal-light);
            border-radius: 8px;
            padding: 1.5rem;
            text-align: center;
            transition: all 0.3s;
        }

        .resource-card:hover {
            border-color: var(--teal);
            box-shadow: 0 5px 15px rgba(13, 148, 136, 0.1);
            transform: translateY(-3px);
        }

        .resource-card h4 {
            color: var(--teal-dark);
            margin-top: 0;
            margin-bottom: 1rem;
            font-size: 1.05rem;
        }

        .resource-card a {
            display: inline-block;
            background: var(--teal);
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            border: none;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s;
            margin-top: 1rem;
        }

        .resource-card a:hover {
            background: var(--teal-dark);
            border: none;
        }

        /* CHECKLIST */
        .checklist {
            background: var(--teal-light);
            border: 2px solid var(--teal);
            border-radius: 8px;
            padding: 2rem;
            margin: 2rem 0;
        }

        .checklist h4 {
            color: var(--teal-dark);
            margin-top: 0;
            margin-bottom: 1.5rem;
        }

        .checklist ul {
            list-style: none;
            padding: 0;
        }

        .checklist li {
            padding: 0.75rem 0;
            padding-left: 2rem;
            position: relative;
            color: var(--slate);
        }

        .checklist li:before {
            content: "\f058";
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            left: 0;
            color: var(--teal);
            font-size: 1.2rem;
        }

        /* BOTTOM CTA BANNER */
        .cta-banner {
            background: linear-gradient(135deg, var(--teal) 0%, var(--teal-dark) 100%);
            color: white;
            padding: 3rem 2rem;
            text-align: center;
            margin-top: 4rem;
            border-radius: 12px;
        }

        .cta-banner h2 {
            color: white;
            margin-bottom: 1rem;
        }

        .cta-banner p {
            color: rgba(255, 255, 255, 0.95);
            font-size: 1.1rem;
            margin-bottom: 2rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .cta-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .cta-btn {
            padding: 1rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s;
        }

        .cta-btn-primary {
            background: white;
            color: var(--teal);
        }

        .cta-btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .cta-btn-secondary {
            background: var(--coral);
            color: white;
            border: 2px solid white;
        }

        .cta-btn-secondary:hover {
            background: transparent;
            color: white;
            transform: translateY(-2px);
        }

        /* FOOTER */
        footer {
            background: var(--navy);
            color: white;
            padding: 3rem 2rem;
            margin-top: 4rem;
        }

        .footer-container {
            max-width: var(--max-width);
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .footer-section h4 {
            color: var(--teal);
            margin-bottom: 1rem;
        }

        .footer-section a,
        .footer-section p {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 0.95rem;
            margin-bottom: 0.5rem;
            display: block;
        }

        .footer-section a:hover {
            color: var(--teal);
            border-bottom: 1px solid var(--teal);
        }

        .footer-bottom {
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 2rem;
            text-align: center;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
        }

        /* MOBILE RESPONSIVE */
        @media (max-width: 768px) {
            

            .hamburger {
                display: flex;
            }

            .hamburger.active span:nth-child(1) {
                transform: rotate(-45deg) translate(-10px, 10px);
            }

            .hamburger.active span:nth-child(2) {
                opacity: 0;
            }

            .hamburger.active span:nth-child(3) {
                transform: rotate(45deg) translate(-8px, -8px);
            }

            .hero h1 {
                font-size: 2rem;
            }

            .hero-subheading {
                font-size: 1rem;
            }

            .main-wrapper {
                flex-direction: column;
                gap: 2rem;
                padding: 2rem 1rem;
            }

            .sidebar {
                width: 100%;
                position: static;
            }

            .toc {
                display: none;
            }

            .parts-grid {
                grid-template-columns: 1fr;
            }

            .comparison-wrapper {
                grid-template-columns: 1fr;
            }

            .cta-buttons {
                flex-direction: column;
            }

            .cta-btn {
                width: 100%;
            }
        }

        /* UTILITY */
        .highlight {
            background: rgba(249, 115, 22, 0.1);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-weight: 600;
            color: var(--coral);
        }

        .note-box {
            background: #fef3c7;
            border-left: 4px solid #f59e0b;
            padding: 1rem;
            border-radius: 6px;
            margin: 1.5rem 0;
            font-size: 0.95rem;
        }

        .note-box strong {
            color: #d97706;
        }

        .hidden-mobile {
            display: block;
        }

        @media (max-width: 768px) {
            .hidden-mobile {
                display: none;
            }
        }

                "@type": "Question",
                "name": "What are the signs that my parent's Medicare plan isn't working?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Look for high out-of-pocket costs, doctors no longer in their network, or paying twice for medications due to coverage gaps. These are signals to review their plan during Annual Enrollment."
                }
            },
            {
                "@type": "Question",
                "name": "How can I check what Medicare plan my parent currently has?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "You can check their Medicare.gov account if they have one, look at their physical Medicare card, or call 1-800-MEDICARE directly to verify their current coverage."
                }
            },
            {
                "@type": "Question",
                "name": "What questions should I ask when reviewing my parent's plan?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Ask: Are their current doctors in-network? Are their prescriptions covered? What are the total out-of-pocket costs? Do they need dental, vision, or hearing coverage?"
                }
            },
            {
                "@type": "Question",
                "name": "How do I find trustworthy help with Medicare without getting scammed?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Work with licensed, independent insurance agents rather than captive agents who only sell one company's plans. Verify licensing through your state's insurance department and be wary of cold calls or TV ads."
                }
            }
        ]
    }
    </script>

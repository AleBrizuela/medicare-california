    <script type="application/ld+json">

            {
                "@type": "Question",
                "name": "What is the Initial Enrollment Period (IEP) for Medicare?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "The Initial Enrollment Period is a 7-month window around your 65th birthday when you can enroll in Medicare. It includes 3 months before your birthday month, your birthday month, and 3 months after. This is the main time to sign up for Medicare if you're not already covered through an employer."
                }
            },
            {
                "@type": "Question",
                "name": "Do I have to enroll in Medicare Part A and Part B at 65?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "If you're not working and don't have employer-based health insurance, yes, you should enroll during your IEP to avoid penalties. However, if you're still working and have health insurance through your employer, you can delay enrollment without penalty as long as you enroll within 8 months of losing that coverage."
                }
            },
            {
                "@type": "Question",
                "name": "What is the late enrollment penalty for Part B?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "If you delay enrolling in Part B without qualifying for an exemption, you'll pay a permanent 10% premium increase for each 12-month period you could have had the coverage. This penalty is added to your Part B premium for the rest of your life."
                }
            },
            {
                "@type": "Question",
                "name": "Should I choose Medicare Advantage or Original Medicare with Medigap?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "This depends on your health needs, budget, and doctor preferences. Medicare Advantage plans typically have lower or no premiums but higher out-of-pocket costs at doctor visits. Original Medicare with Medigap has higher premiums but more predictable costs. Work with a Medicare counselor to compare your specific options."
                }
            },
            {
                "@type": "Question",
                "name": "What are California's guaranteed issue Medigap rights for new Medicare enrollees?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "In California, when you turn 65 and enroll in Original Medicare, you have guaranteed issue rights to buy any Medigap plan. Insurance companies must accept you without waiting periods or excluding pre-existing conditions. This 6-month window starts when you're 65 and enrolled in Part B. California also limits Medigap rate increases for seniors over 75."
                }
            }
        ]
    }
    </script>
